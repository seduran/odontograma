<!DOCTYPE HTML>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Odontograph 1.0.0 (Modernized)</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/styles.css">
    <script type="module" src="js/main.js"></script>
</head>

<body oncontextmenu="return false;">
    <div class="odontograma-container">
        <!-- Canvas for Odontograma drawing -->
        <canvas id="canvas" class="odontograma-canvas" width="648" height="800" crossorigin="anonymous"></canvas>

        <!-- HTML Button overlay matching the exact canvas button positions -->
        <div id="button-overlay" class="button-overlay">
            
            <!-- Row 0 (y = 10px) -->
            <button class="odo-btn diagnosis-btn" style="left: 24px; top: 10px;" data-id="1">Caries</button>
            <button class="odo-btn diagnosis-btn" style="left: 124px; top: 10px;" data-id="2">Crown</button>
            <button class="odo-btn diagnosis-btn" style="left: 224px; top: 10px;" data-id="3">Crown (Tmp)</button>
            <button class="odo-btn diagnosis-btn" style="left: 324px; top: 10px;" data-id="4">Missing</button>
            <button class="odo-btn diagnosis-btn" style="left: 424px; top: 10px;" data-id="5">Fracture</button>
            <button class="odo-btn diagnosis-btn" style="left: 524px; top: 10px;" data-id="8">Diastema</button>

            <!-- Row 1 (y = 30px) -->
            <button class="odo-btn diagnosis-btn" style="left: 24px; top: 30px;" data-id="11">Filling</button>
            <button class="odo-btn diagnosis-btn" style="left: 124px; top: 30px;" data-id="12">Rem Prost</button>
            <button class="odo-btn diagnosis-btn" style="left: 224px; top: 30px;" data-id="13">Drifting</button>
            <button class="odo-btn diagnosis-btn" style="left: 324px; top: 30px;" data-id="14">Rotation</button>
            <button class="odo-btn diagnosis-btn" style="left: 424px; top: 30px;" data-id="15">Fusion</button>
            <button class="odo-btn diagnosis-btn" style="left: 524px; top: 30px;" data-id="16">Root Remnant</button>

            <!-- Row 2 (y = 50px) -->
            <button class="odo-btn diagnosis-btn" style="left: 24px; top: 50px;" data-id="24">Eruption</button>
            <button class="odo-btn diagnosis-btn" style="left: 124px; top: 50px;" data-id="25">Transpositon</button>
            <button class="odo-btn diagnosis-btn" style="left: 224px; top: 50px;" data-id="27">Supernumerary</button>
            <button class="odo-btn diagnosis-btn" style="left: 324px; top: 50px;" data-id="20">Pulp</button>
            <button class="odo-btn diagnosis-btn" style="left: 424px; top: 50px;" data-id="29">Prosthesis</button>
            <button class="odo-btn diagnosis-btn" style="left: 524px; top: 50px;" data-id="30">Bolt</button>

            <!-- Row 3 (y = 70px) -->
            <button class="odo-btn diagnosis-btn" style="left: 24px; top: 70px;" data-id="32">Fixed Ortho</button>
            <button class="odo-btn diagnosis-btn" style="left: 124px; top: 70px;" data-id="34">Fixed Prosth</button>
            <button class="odo-btn diagnosis-btn" style="left: 224px; top: 70px;" data-id="6">Implant</button>
            <button class="odo-btn diagnosis-btn" style="left: 324px; top: 70px;" data-id="17">Macrodontia</button>
            <button class="odo-btn diagnosis-btn" style="left: 424px; top: 70px;" data-id="10">Microdontia</button>
            <button class="odo-btn diagnosis-btn" style="left: 524px; top: 70px;" data-id="22">Dyschromic</button>

            <!-- Row 4 (y = 90px) -->
            <button class="odo-btn diagnosis-btn" style="left: 24px; top: 90px;" data-id="37">Worn</button>
            <button class="odo-btn diagnosis-btn" style="left: 124px; top: 90px;" data-id="30">Impacted Semi</button>
            <button class="odo-btn diagnosis-btn" style="left: 224px; top: 90px;" data-id="20">Intrusion</button>
            <button class="odo-btn diagnosis-btn" style="left: 324px; top: 90px;" data-id="31">Edentulism</button>
            <button class="odo-btn diagnosis-btn" style="left: 424px; top: 90px;" data-id="21">Ectopic</button>
            <button class="odo-btn diagnosis-btn" style="left: 524px; top: 90px;" data-id="19">Impacted</button>

            <!-- Row 5 (y = 110px) -->
            <button class="odo-btn diagnosis-btn" style="left: 24px; top: 110px;" data-id="23">Rem Orthodo</button>
            <button class="odo-btn diagnosis-btn" style="left: 124px; top: 110px;" data-id="9">Extrusion</button>
            <button class="odo-btn diagnosis-btn" style="left: 224px; top: 110px;" data-id="10">Post</button>

            <!-- Control Buttons (y = 150px) -->
            <button id="btn-adult" class="odo-btn control-btn" style="left: 10px; top: 150px;">Adult</button>
            <button id="btn-child" class="odo-btn control-btn" style="left: 90px; top: 150px;">Child</button>
            <button id="btn-reset" class="odo-btn control-btn" style="left: 562px; top: 150px;">Reset</button>

        </div>
    </div>
</body>

</html>
